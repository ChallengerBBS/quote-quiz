version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: quotequiz-postgres
    environment:
      POSTGRES_DB: quotequiz
      POSTGRES_USER: quotequiz
      POSTGRES_PASSWORD: quotequiz123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quotequiz -d quotequiz"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
